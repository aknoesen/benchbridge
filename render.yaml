# Render Blueprint — deploys BridgeM2K as a static site served at the domain root.
# Use it: in the Render dashboard choose New > Blueprint and point at this repo. Render builds the
# Vite app and serves dist/. BASE_PATH=/ tells Vite to build for a root domain (not the GitHub
# Pages /BridgeM2K/ subpath). The rewrite makes any path fall back to index.html (SPA).
services:
  - type: web
    name: bridgem2k
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: BASE_PATH
        value: /
      - key: NODE_VERSION
        value: "22"
    # Cache policy. index.html must NEVER be cached: it is the only file that names the current
    # hashed bundle, so a stale copy pins the browser to an old build and a fresh deploy looks like
    # "the fix didn't ship" (it bit andre three times on 2026-07-13). The assets themselves carry a
    # content hash in the filename, so they can be cached forever.
    headers:
      - path: /index.html
        name: Cache-Control
        value: no-cache, no-store, must-revalidate
      - path: /
        name: Cache-Control
        value: no-cache, no-store, must-revalidate
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
