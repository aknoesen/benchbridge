name: Trigger Render Deploy

# Public-URL Render connections get no GitHub webhook, so Render's "On Commit" auto-deploy never
# fires. This Action runs inside the repo on every push to main and pokes Render's Deploy Hook,
# which builds & deploys the latest commit. Set the RENDER_DEPLOY_HOOK repo secret first.
on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Call Render deploy hook
        run: |
          if [ -z "${{ secrets.RENDER_DEPLOY_HOOK }}" ]; then
            echo "RENDER_DEPLOY_HOOK secret is not set"; exit 1
          fi
          curl -fsS -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"
